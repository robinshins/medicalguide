<svg width="600" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="600" fill="#ffffff"/>
  
  <!-- Subtle border -->
  <rect x="1" y="1" width="598" height="598" rx="32" fill="none" stroke="#e5e7eb" stroke-width="2"/>
  
  <!-- Large bold number -->
  <text x="300" y="340" font-family="Arial,Helvetica,sans-serif" font-size="240" font-weight="900" fill="#0a0a0a" text-anchor="middle" dominant-baseline="central">5</text>
  
  <!-- Thin line under number -->
  <rect x="200" y="420" width="200" height="3" rx="1.5" fill="#0a0a0a"/>
  
  <!-- Site name -->
  <text x="300" y="480" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="500" fill="#9ca3af" text-anchor="middle" letter-spacing="0.08em">MEDICAL KOREA GUIDE</text>
</svg>