name: Publish Articles

on:
  schedule:
    # 24 crons per day (every 30min from UTC 00:00 to 11:30 = KST 09:00~20:30)
    - cron: '0 0 * * *'    # KST 09:00
    - cron: '30 0 * * *'   # KST 09:30
    - cron: '0 1 * * *'    # KST 10:00
    - cron: '30 1 * * *'   # KST 10:30
    - cron: '0 2 * * *'    # KST 11:00
    - cron: '30 2 * * *'   # KST 11:30
    - cron: '0 3 * * *'    # KST 12:00
    - cron: '30 3 * * *'   # KST 12:30
    - cron: '0 4 * * *'    # KST 13:00
    - cron: '30 4 * * *'   # KST 13:30
    - cron: '0 5 * * *'    # KST 14:00
    - cron: '30 5 * * *'   # KST 14:30
    - cron: '0 6 * * *'    # KST 15:00
    - cron: '30 6 * * *'   # KST 15:30
    - cron: '0 7 * * *'    # KST 16:00
    - cron: '30 7 * * *'   # KST 16:30
    - cron: '0 8 * * *'    # KST 17:00
    - cron: '30 8 * * *'   # KST 17:30
    - cron: '0 9 * * *'    # KST 18:00
    - cron: '30 9 * * *'   # KST 18:30
    - cron: '0 10 * * *'   # KST 19:00
    - cron: '30 10 * * *'  # KST 19:30
    - cron: '0 11 * * *'   # KST 20:00
    - cron: '30 11 * * *'  # KST 20:30
  workflow_dispatch: # Manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Random delay (0-10 min)
        run: |
          DELAY=$((RANDOM % 600))
          echo "Waiting ${DELAY}s before starting..."
          sleep $DELAY

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Create .env.local
        run: |
          cat > .env.local << 'EOF'
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}
          EOF

      - name: Create Firebase service account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > medicalkorea-2205a-firebase-adminsdk-fbsvc-70fd6e21f4.json

      - name: Publish next article
        run: node publish-action.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          CHROME_PATH: /usr/bin/google-chrome-stable
