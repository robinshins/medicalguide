name: IndexNow Submit (manual fallback)

# Streaming 전환: publish-action.js가 발행 직후 IndexNow에 제출하므로
# 일일 batch cron은 제거. 누락된 URL 수동 보충용으로 workflow_dispatch만 유지.
on:
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create Firebase service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > medicalkorea-2205a-firebase-adminsdk-fbsvc-70fd6e21f4.json

      - name: Submit to IndexNow
        run: node indexnow-submit.js
